# ============================================================
# NGINX CONFIGURATION — nginx.conf
# Serves the static React build and proxies /api to the backend.
# ============================================================

server {
    listen       3000;
    server_name  localhost;

    # Serve the React SPA
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — return index.html for any route that doesn't
    # match a static file so React Router (if added) can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header Referrer-Policy        "strict-origin"    always;
}
