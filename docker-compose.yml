# ============================================================
# docker-compose.yml — Base configuration
# Shared across all environments. Use profile overrides:
#   Development: docker-compose up (auto-loads docker-compose.override.yml)
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# ============================================================

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${CALCULATOR_BACKEND_PORT:-8080}:8080"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - CALCULATOR_BACKEND_PORT=${CALCULATOR_BACKEND_PORT:-8080}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - LOG_REQUESTS=${LOG_REQUESTS:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "${CALCULATOR_FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
